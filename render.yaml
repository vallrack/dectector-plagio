services:
  # Combo Service (Frontend + Backend en un solo contenedor)
  - type: web
    name: plagiarism-detector-combo
    env: docker
    region: oregon
    plan: free
    envVars:
      - key: COPYLEAKS_EMAIL
        sync: false
      - key: COPYLEAKS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
